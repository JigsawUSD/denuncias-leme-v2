<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denúncia Leme — Portal do Cidadão</title>
    <script>
      // Se estiver no GitHub Pages produtivo e o index.html raiz (não compilado) for servido,
      // redireciona o usuário para a pasta compilada /docs de forma transparente.
      window.addEventListener('DOMContentLoaded', function() {
        var devScript = document.querySelector('script[src*="/src/main.tsx"]');
        if (devScript && window.location.hostname.includes('github.io')) {
          var path = window.location.pathname;
          if (!path.endsWith('/')) {
            path += '/';
          }
          window.location.replace(window.location.origin + path + 'docs/' + window.location.search + window.location.hash);
        }
      });
    </script>
    <script type="module" crossorigin src="./assets/index-CIWDzgiY.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DOz2SIGg.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
